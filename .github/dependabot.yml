version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directory: /client/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directories: ['/plugins/*']
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
