[advisories]
version = 2
yanked = "deny"
ignore = [
    # Unmaintained but not vulnerable; pulled in by utoipa-axum.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
confidence-threshold = 0.9
# New licenses require explicit review.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    # Mozilla CA root data from webpki-roots.
    "CDLA-Permissive-2.0",
    # File-level copyleft from wasmtime/cranelift.
    "MPL-2.0",
]

# The allowlist applies to dependencies, not unpublished workspace crates.
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
